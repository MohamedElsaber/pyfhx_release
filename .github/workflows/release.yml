name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -e .
        pip install pytest

    - name: Run tests
      run: pytest
